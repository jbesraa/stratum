on:
  pull_request:
    branches:
      - main

name: Clippy Checks

jobs:
  clippy-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v2
      - uses: Swatinem/rust-cache@v1.2.0
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.75
          override: true
      - name: Build Benches with MSRV
        run: cargo build --manifest-path=benches/Cargo.toml
      - name: Build Protocols with MSRV
        run: cargo build --manifest-path=protocols/Cargo.toml
      - name: Build Roles with MSRV
        run: cargo build --manifest-path=roles/Cargo.toml
      - name: Build Utils with MSRV
        run: cargo build --manifest-path=utils/Cargo.toml
    steps:
      - uses: actions/checkout@v2
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Build with locked dependencies
        run: |
          cargo build --manifest-path=roles/Cargo.toml --locked
          cargo build --manifest-path=utils/Cargo.toml --locked
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy
      - name: Run Clippy on all workspaces
        run: |
          ./scripts/clippy-checks.sh
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true
          components: rustfmt
      - name: Run fmt on all workspaces
        run: |
          ./scripts/fmt-checks.sh
    steps:
      - name: Use stable toolchain
        uses: actions/checkout@v4
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Roles Integration Tests
        run: |
         RUST_LOG=debug cargo test --manifest-path=roles/Cargo.toml --verbose --test '*' -- --nocapture
